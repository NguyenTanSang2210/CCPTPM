name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # Thêm chmod để tránh lỗi "Permission denied" khi chạy mvnw
      run: chmod +x mvnw && ./mvnw clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        # Đảm bảo bạn đã tạo 2 secret này trong GitHub Settings
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        docker build -t nguyentansang04/duanjava:latest .
        docker push nguyentansang04/duanjava:latest

    - name: Triển khai lên DevOps Classroom
      run: |
        REPO="nguyentansang04/duanjava"
        CONTAINER_PORT=80
        
        # Gọi Webhook triển khai
        RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT")
        
        BODY=$(echo "$RESPONSE" | sed '$d')
        CODE=$(echo "$RESPONSE" | tail -n1)
        
        echo "Webhook HTTP Status: $CODE"
        
        if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
          echo "Deploy thất bại!"
          echo "::group::Chi tiết lỗi từ Server"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          exit 1
        fi
        
        echo "Deploy thành công rực rỡ!"
        echo "::group::Phản hồi từ Server"
        echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
        echo "::endgroup::"
